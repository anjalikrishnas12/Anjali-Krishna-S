<html>
<head>
<title>Combined Frames</title>
</head>

<frameset rows="50%,50%">

    <!-- Top Row -->

        <frame src="data:text/html,<body bgcolor='red'></body>">
        <frame src="data:text/html,<body bgcolor='blue'></body>">
    </frameset>

    <!-- Bottom Row -->

        <frame src="data:text/html,<body bgcolor='green'></body>">
        <frame src="data:text/html,<body bgcolor='yellow'></body>">
    </frameset>

</frameset>

</html>
